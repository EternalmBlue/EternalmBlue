name: Generate Contribution Snake

on:
  schedule:
    - cron: "20 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-snake.svg?color_snake=#7DF9FF&color_dots=#0B1026,#1B2755,#7C3AED,#7DF9FF,#FF4FD8
            assets/github-snake-dark.svg?palette=github-dark&color_snake=#FF4FD8

      - name: Commit generated snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-snake.svg assets/github-snake-dark.svg
          if git diff --cached --quiet; then
            echo "No snake changes to commit."
          else
            git commit -m "Generate contribution snake"
            git push
          fi
