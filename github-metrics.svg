<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EternalBlue metrics placeholder</title>
  <desc id="desc">Initial metrics panel. GitHub Actions will replace this file with live lowlighter metrics.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="900" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0B1026"/>
      <stop offset="1" stop-color="#1B0D35"/>
    </linearGradient>
    <linearGradient id="bar" x1="90" y1="0" x2="810" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DF9FF"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FF4FD8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: .55; }
        50% { opacity: 1; }
      }
      .line { animation: pulse 2.8s ease-in-out infinite; }
      .text { font-family: "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="900" height="520" rx="24" fill="url(#panel)"/>
  <rect x="42" y="40" width="816" height="440" rx="18" fill="#050A18" stroke="#7DF9FF" stroke-opacity=".28"/>
  <text x="70" y="88" class="text" font-size="28" font-weight="800" fill="#E0FBFF">METRICS CONSTELLATION</text>
  <text x="70" y="124" class="text" font-size="16" font-weight="600" fill="#D7BFFF">Live GitHub dashboard will be generated by lowlighter/metrics.</text>
  <g filter="url(#glow)">
    <rect x="70" y="172" width="760" height="12" rx="6" fill="url(#bar)" class="line"/>
    <rect x="70" y="232" width="520" height="12" rx="6" fill="#7DF9FF" opacity=".82"/>
    <rect x="70" y="292" width="640" height="12" rx="6" fill="#7C3AED" opacity=".82"/>
    <rect x="70" y="352" width="430" height="12" rx="6" fill="#FF4FD8" opacity=".82"/>
  </g>
  <text x="70" y="220" class="text" font-size="18" font-weight="700" fill="#E0FBFF">Activity / Repositories / Metadata</text>
  <text x="70" y="280" class="text" font-size="18" font-weight="700" fill="#E0FBFF">Languages / Achievements</text>
  <text x="70" y="340" class="text" font-size="18" font-weight="700" fill="#E0FBFF">Isometric Calendar</text>
  <text x="70" y="430" class="text" font-size="15" font-weight="600" fill="#8BA4FF">Run the Metrics workflow once to unlock live data.</text>
</svg>
