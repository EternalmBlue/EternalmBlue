<svg width="920" height="86" viewBox="0 0 920 86" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EternalBlue cosmic signal strip</title>
  <desc id="desc">Animated sci-fi signal strip showing EternalBlue development themes.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="920" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0B1026"/>
      <stop offset="1" stop-color="#1B0D35"/>
    </linearGradient>
    <linearGradient id="edge" x1="54" y1="0" x2="866" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DF9FF"/>
      <stop offset="0.52" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FF4FD8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes scan {
        0% { transform: translateX(-90px); opacity: 0; }
        20%, 68% { opacity: .42; }
        100% { transform: translateX(960px); opacity: 0; }
      }
      @keyframes blink {
        0%, 44% { opacity: 1; }
        45%, 100% { opacity: .15; }
      }
      @keyframes rotateText {
        0%, 18% { opacity: 1; }
        23%, 100% { opacity: 0; }
      }
      .scan { animation: scan 5.8s ease-in-out infinite; }
      .cursor { animation: blink 1s steps(1) infinite; }
      .line { font-family: "Segoe UI", Arial, sans-serif; font-size: 24px; font-weight: 800; letter-spacing: 0; }
      .label { font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 0; }
      .t1 { animation: rotateText 15s linear infinite; }
      .t2 { animation: rotateText 15s linear infinite; animation-delay: 3s; opacity: 0; }
      .t3 { animation: rotateText 15s linear infinite; animation-delay: 6s; opacity: 0; }
      .t4 { animation: rotateText 15s linear infinite; animation-delay: 9s; opacity: 0; }
      .t5 { animation: rotateText 15s linear infinite; animation-delay: 12s; opacity: 0; }
    </style>
  </defs>
  <rect x="1" y="1" width="918" height="84" rx="18" fill="url(#panel)" stroke="url(#edge)" stroke-opacity=".72" stroke-width="2"/>
  <path d="M48 21H198" stroke="#7DF9FF" stroke-opacity=".5" stroke-linecap="round"/>
  <path d="M722 65H872" stroke="#FF4FD8" stroke-opacity=".55" stroke-linecap="round"/>
  <rect class="scan" x="0" y="0" width="86" height="86" fill="url(#edge)" opacity=".1"/>
  <text x="54" y="36" class="label" fill="#7DF9FF">TRANSMISSION</text>
  <g filter="url(#glow)">
    <text x="460" y="54" text-anchor="middle" class="line t1" fill="#E0FBFF">Initializing Cosmic Build System...</text>
    <text x="460" y="54" text-anchor="middle" class="line t2" fill="#D7BFFF">Training AI Agents under Starlight</text>
    <text x="460" y="54" text-anchor="middle" class="line t3" fill="#7DF9FF">Deploying Full-Stack Nebula</text>
    <text x="460" y="54" text-anchor="middle" class="line t4" fill="#FF4FD8">Exploring Endless Destiny</text>
    <text x="460" y="54" text-anchor="middle" class="line t5" fill="#FFE68A">Java + Python + Kubernetes + LLMs</text>
  </g>
  <rect class="cursor" x="758" y="34" width="10" height="26" rx="2" fill="#7DF9FF"/>
</svg>
