<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EternalBlue cosmic cyber nebula banner</title>
  <desc id="desc">A neon cyan and violet sci-fi nebula banner for EternalBlue with animated stars, orbit lines, and the motto Exploring Endless Destiny.</desc>
  <defs>
    <radialGradient id="nebulaCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(225 160) rotate(30) scale(420 230)">
      <stop stop-color="#7DF9FF" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#6A5CFF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaMagenta" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(910 250) rotate(-23) scale(420 260)">
      <stop stop-color="#FF4FD8" stop-opacity="0.64"/>
      <stop offset="0.44" stop-color="#7C3AED" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(610 80) scale(310 190)">
      <stop stop-color="#FFE68A" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGradient" x1="280" y1="120" x2="920" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DF9FF">
        <animate attributeName="stop-color" values="#7DF9FF;#D7BFFF;#7DF9FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.52" stop-color="#D7BFFF">
        <animate attributeName="stop-color" values="#D7BFFF;#FF4FD8;#D7BFFF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#FF4FD8">
        <animate attributeName="stop-color" values="#FF4FD8;#7DF9FF;#FF4FD8" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="orbitGradient" x1="200" y1="70" x2="1020" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DF9FF" stop-opacity="0.05"/>
      <stop offset="0.5" stop-color="#7DF9FF" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#FF4FD8" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="blurGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.49 0 0 0 0 0.98 0 0 0 0 1 0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="microGrid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#7DF9FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      @keyframes drift {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(18px, -10px); }
      }
      @keyframes counterDrift {
        0%, 100% { transform: translate(0, 0); }
        50% { transform: translate(-14px, 12px); }
      }
      @keyframes twinkle {
        0%, 100% { opacity: .28; transform: scale(.88); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes dash {
        to { stroke-dashoffset: -420; }
      }
      @keyframes scan {
        0% { transform: translateX(-260px); opacity: 0; }
        18%, 68% { opacity: .42; }
        100% { transform: translateX(1260px); opacity: 0; }
      }
      .cyan-nebula { animation: drift 13s ease-in-out infinite; }
      .magenta-nebula { animation: counterDrift 15s ease-in-out infinite; }
      .star { animation: twinkle 3.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .star.s2 { animation-delay: .7s; }
      .star.s3 { animation-delay: 1.4s; }
      .orbit { stroke-dasharray: 10 18; animation: dash 18s linear infinite; }
      .orbit.fast { animation-duration: 11s; }
      .scanline { animation: scan 7s ease-in-out infinite; }
      .title-text {
        font-family: "Orbitron", "Segoe UI", Arial, sans-serif;
        font-size: 86px;
        font-weight: 800;
        letter-spacing: 0;
      }
      .subtitle-text {
        font-family: "Segoe UI", Arial, sans-serif;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0;
      }
      .meta-text {
        font-family: "Segoe UI", Arial, sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0;
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="34" fill="#020617"/>
  <rect width="1200" height="420" rx="34" fill="url(#microGrid)"/>
  <rect class="cyan-nebula" x="-80" y="-80" width="620" height="420" fill="url(#nebulaCyan)" filter="url(#blurGlow)"/>
  <rect class="magenta-nebula" x="670" y="80" width="610" height="400" fill="url(#nebulaMagenta)" filter="url(#blurGlow)"/>
  <rect x="330" y="-80" width="560" height="310" fill="url(#starGold)"/>

  <g opacity="0.95">
    <circle class="star" cx="93" cy="72" r="2.2" fill="#E0FBFF"/>
    <circle class="star s2" cx="163" cy="318" r="1.7" fill="#D7BFFF"/>
    <circle class="star s3" cx="249" cy="112" r="1.8" fill="#FFE68A"/>
    <circle class="star s2" cx="334" cy="356" r="1.5" fill="#7DF9FF"/>
    <circle class="star" cx="444" cy="66" r="2" fill="#F8FAFC"/>
    <circle class="star s3" cx="521" cy="333" r="1.5" fill="#FF4FD8"/>
    <circle class="star s2" cx="681" cy="58" r="2.4" fill="#7DF9FF"/>
    <circle class="star" cx="755" cy="346" r="1.8" fill="#E0FBFF"/>
    <circle class="star s3" cx="866" cy="96" r="1.7" fill="#D7BFFF"/>
    <circle class="star s2" cx="982" cy="326" r="2.2" fill="#FFE68A"/>
    <circle class="star" cx="1088" cy="116" r="1.9" fill="#7DF9FF"/>
    <circle class="star s3" cx="1137" cy="274" r="1.7" fill="#FF4FD8"/>
  </g>

  <g opacity="0.7">
    <path class="orbit" d="M126 285C311 107 533 61 743 111C930 155 1016 265 1098 352" stroke="url(#orbitGradient)" stroke-width="2.2"/>
    <path class="orbit fast" d="M91 157C271 216 428 240 628 212C827 184 990 109 1132 61" stroke="#FF4FD8" stroke-opacity="0.42" stroke-width="1.5"/>
    <path class="orbit" d="M220 374C390 300 518 285 685 319C844 351 967 348 1086 285" stroke="#7DF9FF" stroke-opacity="0.34" stroke-width="1.6"/>
  </g>

  <g class="scanline">
    <rect x="0" y="0" width="170" height="420" fill="url(#orbitGradient)" opacity="0.25"/>
    <path d="M28 48L142 372" stroke="#7DF9FF" stroke-opacity="0.52" stroke-width="1"/>
  </g>

  <g filter="url(#neon)">
    <text x="600" y="190" text-anchor="middle" class="title-text" fill="url(#titleGradient)">EternalBlue</text>
    <text x="600" y="238" text-anchor="middle" class="subtitle-text" fill="#D7BFFF">Exploring Endless Destiny</text>
  </g>

  <g opacity="0.94">
    <rect x="438" y="274" width="324" height="39" rx="19.5" fill="#0B1026" fill-opacity="0.72" stroke="#7DF9FF" stroke-opacity="0.48"/>
    <text x="600" y="299" text-anchor="middle" class="meta-text" fill="#E0FBFF">AI DEV / FULL-STACK / COSMIC BUILDER</text>
  </g>

  <g opacity="0.82">
    <path d="M52 47H190" stroke="#7DF9FF" stroke-width="2" stroke-linecap="round"/>
    <path d="M1010 373H1148" stroke="#FF4FD8" stroke-width="2" stroke-linecap="round"/>
    <circle cx="205" cy="47" r="4" fill="#7DF9FF"/>
    <circle cx="995" cy="373" r="4" fill="#FF4FD8"/>
  </g>
</svg>
