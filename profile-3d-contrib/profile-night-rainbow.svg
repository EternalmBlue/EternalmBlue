<svg width="900" height="560" viewBox="0 0 900 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EternalBlue 3D contribution placeholder</title>
  <desc id="desc">Initial 3D contribution calendar panel. GitHub Actions will replace this file with a generated 3D contribution calendar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset=".5" stop-color="#0B1026"/>
      <stop offset="1" stop-color="#1B0D35"/>
    </linearGradient>
    <linearGradient id="cell" x1="220" y1="120" x2="700" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DF9FF"/>
      <stop offset=".5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#FF4FD8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .text { font-family: "Segoe UI", Arial, sans-serif; letter-spacing: 0; }
    </style>
  </defs>
  <rect width="900" height="560" rx="24" fill="url(#bg)"/>
  <g opacity=".72" filter="url(#glow)">
    <path d="M250 322L450 218L650 322L450 426L250 322Z" fill="#0B1026" stroke="#7DF9FF" stroke-opacity=".52"/>
    <path d="M450 218L650 322V382L450 486V426L650 322" fill="#130C30" stroke="#FF4FD8" stroke-opacity=".32"/>
    <path d="M250 322L450 426V486L250 382V322Z" fill="#071426" stroke="#7DF9FF" stroke-opacity=".26"/>
    <g transform="translate(318 250) skewY(-27)">
      <rect width="28" height="28" rx="4" fill="url(#cell)"/>
      <rect x="42" width="28" height="28" rx="4" fill="#7DF9FF"/>
      <rect x="84" width="28" height="28" rx="4" fill="#7C3AED"/>
      <rect x="126" width="28" height="28" rx="4" fill="#FF4FD8"/>
      <rect y="42" width="28" height="28" rx="4" fill="#7C3AED"/>
      <rect x="42" y="42" width="28" height="28" rx="4" fill="#FF4FD8"/>
      <rect x="84" y="42" width="28" height="28" rx="4" fill="#7DF9FF"/>
      <rect x="126" y="42" width="28" height="28" rx="4" fill="#D7BFFF"/>
    </g>
  </g>
  <text x="450" y="116" text-anchor="middle" class="text" font-size="31" font-weight="800" fill="#E0FBFF">3D CONTRIBUTION ORBIT</text>
  <text x="450" y="156" text-anchor="middle" class="text" font-size="17" font-weight="600" fill="#D7BFFF">Awaiting the first GitHub Actions render.</text>
  <text x="450" y="500" text-anchor="middle" class="text" font-size="15" font-weight="600" fill="#8BA4FF">profile-3d-contrib/profile-night-rainbow.svg</text>
</svg>
